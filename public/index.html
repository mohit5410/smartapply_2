iv><div class="f"><div class="fl">Sem/Sec:</div><div class="fv">Sem '+a.semester+' - Sec '+a.section+'</div></div><div class="f"><div class="fl">Subject:</div><div class="fv">'+a.subject+'</div></div><div style="margin-top:14px;font-weight:bold;font-size:12px;color:#555">APPLICATION CONTENT</div><div class="ct">'+a.content+'</div>'+st+(a.status==="approved"?'<div class="bg">OFFICIALLY APPROVED</div>':'')+'<div class="ft">SmartApply - Amity University</div></body></html>';const w=window.open("","_blank");w.document.write(ht);w.document.close();setTimeout(()=>w.print(),500)}

function showPwModal(){const ex=document.getElementById("pw-modal");if(ex)ex.remove();document.body.appendChild(h("div",{id:"pw-modal",className:"modal-bg"},h("div",{className:"modal"},h("h3",{style:{fontSize:"18px",fontWeight:700,marginBottom:"16px"}},"🔒 Change Password"),h("div",{id:"pw-err"}),h("div",{style:{marginBottom:"12px"}},h("label",{className:"lbl"},"Current Password"),h("input",{id:"pw-cur",className:"inp",type:"password"})),h("div",{style:{marginBottom:"12px"}},h("label",{className:"lbl"},"New Password"),h("input",{id:"pw-new",className:"inp",type:"password"})),h("div",{style:{marginBottom:"16px"}},h("label",{className:"lbl"},"Confirm"),h("input",{id:"pw-cnf",className:"inp",type:"password"})),h("div",{style:{display:"flex",gap:"10px"}},h("button",{className:"btn",style:{background:"#16a34a",flex:1},onClick:async()=>{const c=document.getElementById("pw-cur").value,n=document.getElementById("pw-new").value,cf=document.getElementById("pw-cnf").value,ed=document.getElementById("pw-err");ed.innerHTML="";if(!c||!n||!cf){ed.innerHTML='<div style="background:#fef2f2;color:#dc2626;padding:10px;border-radius:8px;font-size:13px;margin-bottom:12px">All fields required.</div>';return}if(n!==cf){ed.innerHTML='<div style="background:#fef2f2;color:#dc2626;padding:10px;border-radius:8px;font-size:13px;margin-bottom:12px">Passwords don\'t match.</div>';return}try{await API.post("/auth/change-password",{currentPassword:c,newPassword:n});document.getElementById("pw-modal").remove();showToast("Password changed!","success")}catch(e){ed.innerHTML='<div style="background:#fef2f2;color:#dc2626;padding:10px;border-radius:8px;font-size:13px;margin-bottom:12px">'+e.message+'</div>'}}},"✓ Change"),h("button",{className:"btn",style:{background:"#6b7280",flex:1},onClick:()=>document.getElementById("pw-modal").remove()},"Cancel")))))}

function roleDesc(r){
  const ri=RINFO[r.role]||{};let desc=ri.label||r.role;
  if(r.role==="hod"&&r.deptId)desc+=" — "+(DEPTS[r.deptId]?.short||r.deptId);
  if(r.role==="pl")desc+=" — "+r.program+" S"+r.semester+"-"+r.section;
  if(r.role==="coordinator")desc+=" (All Departments)";
  return desc;

async function doLogin(){
  const uid=(document.getElementById("login-uid")||{}).value||"";
  const pw=(document.getElementById("login-pw")||{}).value||"";
  if(!uid.trim()||!pw.trim()){showToast("Enter User ID and Password","error");return}
  const errDiv=document.getElementById("login-err");if(errDiv)errDiv.innerHTML="";
  const btn=document.getElementById("login-btn");if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Logging in...';}
  try{
    const data=await API.post("/auth/login",{userId:uid.trim(),password:pw});
    if(data.needsRoleSelect){
      // Multiple roles — show role picker
      showRolePicker(data.user, data.tempUserId);
    }else{
      // Single role — go straight to dashboard
      API.setToken(data.token);CU=data.user;AR=data.activeRole;RD=data.roleData;
      if(AR==="admin")renderAdmin();else renderDashboard();
    }
  }catch(e){
    if(errDiv)errDiv.innerHTML='<div style="background:#fef2f2;color:#dc2626;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;border:1px solid #fecaca">⚠️ '+e.message+'</div>';
    if(btn){btn.disabled=false;btn.textContent="🔐 Login"}
  }
}

    h("div",{className:"card",style:{padding:"24px"}},

              API.setToken(data.token);CU=data.user;AR=data.activeRole;RD=data.roleData;
              if(AR==="admin")renderAdmin();else renderDashboard();

      }),

    )

}

            h("div",{className:"upload-zone",onClick:()=>document.getElementById("f-inp").click()},h("div",{style:{fontSize:"32px",marginBottom:"8px"}},"📤"),h("p",{style:{fontSize:"14px",fontWeight:600}},"Click to upload"),h("p",{style:{fontSize:"12px",color:"#888"}},"Columns: UserID, Password, Name, FatherName, MotherName, EnrollmentNo, Email"),
              h("input",{id:"f-inp",type:"file",accept:".xlsx,.xls,.csv",style:{display:"none"},onChange:async e=>{const f=e.target.files[0];if(!f)return;const fd=new FormData();fd.append("file",f);try{const r=await API.upload("/admin/students/upload",fd);showToast(r.message,"success");await load();draw()}catch(e){showToast(e.message,"error")}}}))
